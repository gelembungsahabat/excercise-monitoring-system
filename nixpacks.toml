[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m pip install -r requirements.txt",
  "cd dashboard/frontend && npm install"
]

[phases.build]
cmds = [
  "cd dashboard/frontend && npm run build"
]

[start]
cmd = "uvicorn dashboard.api:app --host 0.0.0.0 --port $PORT"
